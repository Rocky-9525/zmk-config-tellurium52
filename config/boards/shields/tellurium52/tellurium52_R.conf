# 右手側 = 親機(Central)。これがないとPCに認識されません
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# ZMK Studioを有効にする
CONFIG_ZMK_STUDIO=y
# ロックを最初から解除しておく(繋がりやすくするため)
CONFIG_ZMK_STUDIO_LOCKING=n

# ロータリーエンコーダー(ダイヤル)を有効にする
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# マウス機能(エンコーダーのスクロール/クリックで使用)
CONFIG_ZMK_MOUSE=y

# 省電力設定
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Bluetoothの出力を少し上げる
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# USB経由のログ出力(デバッグ用。row/col/positionまで見えるレベル4にする)
CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG_DEFAULT_LEVEL=4

# チャーリープレクス配線はピン切り替え直後にノイズが乗りやすいため、
# 出力を切り替えてから読み取るまで・次の出力に移るまでに少し待ち時間を入れる
CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BEFORE_INPUTS=100
CONFIG_ZMK_KSCAN_CHARLIEPLEX_WAIT_BETWEEN_OUTPUTS=100
