# 右手側 = 親機(Central)。これがないとPCに認識されません
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# ZMK Studioを有効にする
CONFIG_ZMK_STUDIO=y
# ロックを最初から解除しておく(繋がりやすくするため)
CONFIG_ZMK_STUDIO_LOCKING=n

# ロータリーエンコーダー(ダイヤル)を有効にする(マトリクス検証のため一時的にコメントアウト)
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# マウス機能(エンコーダーのスクロール/クリックで使用)
CONFIG_ZMK_MOUSE=y

# 省電力設定
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Bluetoothの出力を少し上げる
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# USB経由のログ出力(デバッグ用)
# 全体はINFO(3)のまま起動時のBluetoothログでUSBを詰まらせない。
# ZMKモジュールだけをDBGにして、kscanのrow/colイベントを見えるようにする。
CONFIG_ZMK_USB_LOGGING=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_ZMK_LOG_LEVEL_DBG=y
