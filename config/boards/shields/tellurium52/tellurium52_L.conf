# 左手側 = 子機(Peripheral)
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# ZMK Studioを有効にする
CONFIG_ZMK_STUDIO=y
# ロックを最初から解除しておく(繋がりやすくするため)
CONFIG_ZMK_STUDIO_LOCKING=n

# ロータリーエンコーダー(ダイヤル)を有効にする(マトリクス検証のため一時的にコメントアウト)
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# マウス機能(エンコーダーのスクロール/クリックで使用)
CONFIG_ZMK_MOUSE=y

# 省電力設定
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Bluetoothの出力を少し上げる
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
