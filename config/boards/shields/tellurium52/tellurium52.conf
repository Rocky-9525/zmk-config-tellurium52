# ZMK Studioを有効にする
CONFIG_ZMK_STUDIO=y
# ロックを最初から解除しておく（これで繋がりやすくなります）
CONFIG_ZMK_STUDIO_LOCKING=n

# 右手を親機にする設定（これがないとPCに認識されません）
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# ロータリーエンコーダー（ダイヤル）を有効にする
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 省電力設定
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Bluetoothの出力を少し上げる
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
